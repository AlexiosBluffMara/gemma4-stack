<title>Gemma 4</title>
<style>
  /* ==========================================================================
     DESIGN SYSTEM — Apple HIG-inspired dark theme
     Spacing: 4px grid. Touch targets: 44px min. Typography: SF Pro system stack.
     ========================================================================== */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* ── Palette ─────────────────────────────────────────────────────────── */
    --bg:             #0a0c12;
    --surface:        rgba(22, 25, 35, 0.72);
    --surface-solid:  #161923;
    --surface2:       #1c2030;
    --surface3:       #242838;
    --border:         rgba(255, 255, 255, 0.08);
    --border-focus:   rgba(108, 140, 255, 0.5);
    --text:           #f0f1f5;
    --text-secondary: #a0a4b8;
    --text-tertiary:  #6b7084;
    --accent:         #6c8cff;
    --accent-hover:   #8aa4ff;
    --accent-dim:     #4a63cc;
    --accent-surface: rgba(108, 140, 255, 0.12);
    --user-bg:        linear-gradient(135deg, #2a3a6e 0%, #1e2d5c 100%);
    --assistant-bg:   #161923;
    --green:          #34d399;
    --green-dim:      rgba(52, 211, 153, 0.15);
    --red:            #f87171;
    --red-dim:        rgba(248, 113, 113, 0.12);
    --yellow:         #fbbf24;
    --yellow-dim:     rgba(251, 191, 36, 0.12);

    /* ── Typography ──────────────────────────────────────────────────────── */
    --font-sans:  -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display',
                  'Helvetica Neue', 'Segoe UI', Roboto, system-ui, sans-serif;
    --font-mono:  'SF Mono', ui-monospace, 'Cascadia Code', 'Fira Code',
                  'JetBrains Mono', 'Menlo', monospace;
    --text-xs:    clamp(10px, 0.625rem + 0.1vw, 11px);
    --text-sm:    clamp(12px, 0.75rem + 0.1vw, 13px);
    --text-base:  clamp(14px, 0.875rem + 0.1vw, 15px);
    --text-md:    clamp(15px, 0.9375rem + 0.1vw, 16px);
    --text-lg:    clamp(16px, 1rem + 0.15vw, 18px);

    /* ── Spacing (4px grid) ──────────────────────────────────────────────── */
    --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;  --sp-4: 16px;
    --sp-5: 20px; --sp-6: 24px; --sp-8: 32px;  --sp-10: 40px;

    /* ── Radii ───────────────────────────────────────────────────────────── */
    --r-sm: 8px;  --r-md: 12px; --r-lg: 16px; --r-xl: 20px; --r-full: 9999px;

    /* ── Blur ────────────────────────────────────────────────────────────── */
    --blur: 24px;

    /* ── Transitions ─────────────────────────────────────────────────────── */
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
    --ease-in-out: cubic-bezier(0.45, 0, 0.55, 1);
    --dur-fast:    120ms;
    --dur-normal:  200ms;
    --dur-slow:    350ms;

    /* ── Safe areas ──────────────────────────────────────────────────────── */
    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left:   env(safe-area-inset-left, 0px);
    --safe-right:  env(safe-area-inset-right, 0px);
  }

  html, body {
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-text-size-adjust: 100%;
  }

  body {
    font-family: var(--font-sans);
    font-size: var(--text-base);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
  }

  /* ==========================================================================
     HEADER — Apple-style frosted glass bar
     ========================================================================== */

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--sp-3) var(--sp-5);
    padding-left: calc(var(--sp-5) + var(--safe-left));
    padding-right: calc(var(--sp-5) + var(--safe-right));
    background: var(--surface);
    -webkit-backdrop-filter: saturate(180%) blur(var(--blur));
    backdrop-filter: saturate(180%) blur(var(--blur));
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 100;
    min-height: 52px;
    gap: var(--sp-3);
  }

  .logo { display: flex; align-items: center; gap: var(--sp-2); flex-shrink: 0; }

  .logo h1 {
    font-size: var(--text-md);
    font-weight: 600;
    letter-spacing: -0.4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .logo .badge {
    font-size: var(--text-xs);
    font-family: var(--font-mono);
    font-weight: 600;
    background: var(--accent-surface);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: var(--r-full);
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .header-center {
    display: flex;
    gap: var(--sp-4);
    align-items: center;
    flex-shrink: 1;
    min-width: 0;
  }

  .devices {
    display: flex;
    gap: var(--sp-3);
    align-items: center;
    font-size: var(--text-sm);
    color: var(--text-secondary);
  }

  .device {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: var(--r-full);
    background: var(--red);
    flex-shrink: 0;
    transition: background var(--dur-normal) var(--ease-out),
                box-shadow var(--dur-normal) var(--ease-out);
  }
  .dot.online {
    background: var(--green);
    box-shadow: 0 0 8px rgba(52, 211, 153, 0.4);
  }
  .dot.checking {
    background: var(--yellow);
    animation: dot-pulse 1.2s ease-in-out infinite;
  }

  @keyframes dot-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  /* ── Auth area ──────────────────────────────────────────────────────────── */

  .user-area {
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    flex-shrink: 0;
  }

  .auth-btn {
    font-family: var(--font-sans);
    font-size: var(--text-sm);
    font-weight: 500;
    background: var(--accent-dim);
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: var(--r-sm);
    cursor: pointer;
    transition: background var(--dur-fast) var(--ease-out),
                transform var(--dur-fast) var(--ease-spring);
    -webkit-tap-highlight-color: transparent;
    min-height: 32px;
    white-space: nowrap;
  }
  .auth-btn:hover { background: var(--accent); }
  .auth-btn:active { transform: scale(0.97); }

  .auth-btn.small {
    padding: 4px 10px;
    font-size: var(--text-xs);
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .auth-btn.small:hover { border-color: var(--red); color: var(--red); }

  .user-avatar { width: 28px; height: 28px; border-radius: var(--r-full); flex-shrink: 0; }

  .user-name {
    font-size: var(--text-sm);
    color: var(--text-secondary);
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ==========================================================================
     BANNERS — Error + Usage
     ========================================================================== */

  .error-banner {
    background: var(--red-dim);
    color: var(--red);
    font-size: var(--text-sm);
    font-weight: 500;
    padding: var(--sp-2) var(--sp-5);
    padding-left: calc(var(--sp-5) + var(--safe-left));
    padding-right: calc(var(--sp-5) + var(--safe-right));
    text-align: center;
    border-bottom: 1px solid rgba(248, 113, 113, 0.15);
    flex-shrink: 0;
    transform: translateY(-100%);
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: all var(--dur-slow) var(--ease-out);
  }
  .error-banner.visible {
    transform: translateY(0);
    opacity: 1;
    max-height: 60px;
  }

  .usage-bar {
    font-size: var(--text-xs);
    font-family: var(--font-mono);
    color: var(--text-tertiary);
    padding: var(--sp-1) var(--sp-5);
    background: var(--surface-solid);
    border-bottom: 1px solid var(--border);
    display: none;
    text-align: center;
    flex-shrink: 0;
  }
  .usage-bar.visible { display: block; }

  /* ==========================================================================
     CHAT AREA — Scrollable message list
     ========================================================================== */

  #chat {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    overscroll-behavior-y: contain;
    padding: var(--sp-5);
    padding-left: calc(var(--sp-5) + var(--safe-left));
    padding-right: calc(var(--sp-5) + var(--safe-right));
    display: flex;
    flex-direction: column;
    gap: var(--sp-2);
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }

  /* Custom scrollbar */
  #chat::-webkit-scrollbar { width: 5px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.1);
    border-radius: var(--r-full);
  }
  #chat::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.18); }

  /* Firefox scrollbar */
  #chat { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }

  /* ── Drop zone overlay ─────────────────────────────────────────────────── */

  .drop-overlay {
    display: none;
    position: absolute;
    inset: var(--sp-2);
    background: var(--accent-surface);
    border: 2px dashed var(--accent);
    border-radius: var(--r-lg);
    z-index: 50;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: var(--sp-2);
    pointer-events: none;
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
  }
  .drop-overlay.active { display: flex; }
  .drop-overlay-icon { font-size: 40px; opacity: 0.6; }
  .drop-overlay-text {
    font-size: var(--text-md);
    color: var(--accent);
    font-weight: 500;
  }

  /* ==========================================================================
     MESSAGES — Chat bubbles
     ========================================================================== */

  .msg {
    max-width: min(75%, 640px);
    padding: var(--sp-3) var(--sp-4);
    border-radius: var(--r-lg);
    line-height: 1.55;
    font-size: var(--text-base);
    animation: msg-in var(--dur-slow) var(--ease-out) both;
    word-break: break-word;
    overflow-wrap: anywhere;
    position: relative;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    border-bottom-right-radius: var(--sp-1);
    color: #fff;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: var(--sp-1);
  }

  /* Code styling */
  .msg.assistant code {
    font-family: var(--font-mono);
    font-size: 0.9em;
    background: rgba(255, 255, 255, 0.06);
    padding: 1px 6px;
    border-radius: var(--sp-1);
    -webkit-box-decoration-break: clone;
    box-decoration-break: clone;
  }

  .msg.assistant pre {
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    background: rgba(0, 0, 0, 0.35);
    padding: var(--sp-3);
    border-radius: var(--r-sm);
    overflow-x: auto;
    margin: var(--sp-2) 0;
    white-space: pre-wrap;
    word-break: break-all;
    -webkit-overflow-scrolling: touch;
  }

  .msg.assistant pre code { background: none; padding: 0; font-size: inherit; }

  .msg-text { white-space: pre-wrap; }

  /* ── Message attachments ───────────────────────────────────────────────── */

  .msg-attachments {
    display: flex;
    flex-wrap: wrap;
    gap: var(--sp-2);
    margin-bottom: var(--sp-2);
  }

  .msg-attachments img {
    max-width: min(300px, 100%);
    max-height: 200px;
    border-radius: var(--r-sm);
    cursor: pointer;
    object-fit: cover;
    transition: transform var(--dur-fast) var(--ease-spring);
  }
  .msg-attachments img:hover { transform: scale(1.02); }

  .msg-attachments audio {
    height: 36px;
    border-radius: var(--r-sm);
    max-width: min(260px, 100%);
  }

  .msg-media-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 255, 255, 0.05);
    padding: 6px var(--sp-3);
    border-radius: var(--r-sm);
    font-size: var(--text-sm);
    color: var(--text-secondary);
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .routing-info {
    font-size: var(--text-xs);
    font-family: var(--font-mono);
    color: var(--text-tertiary);
    margin-top: var(--sp-2);
    padding-top: var(--sp-2);
    border-top: 1px solid var(--border);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Typing indicator (properly contained!) ────────────────────────────── */

  .typing {
    align-self: flex-start;
    padding: var(--sp-3) var(--sp-4);
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    border-bottom-left-radius: var(--sp-1);
    display: inline-flex;
    align-items: center;
    gap: 5px;
    animation: msg-in var(--dur-slow) var(--ease-out) both;
    max-width: min(75%, 640px);
    overflow: hidden;
    min-width: 60px;
    height: 44px;
  }

  .typing-dots {
    display: flex;
    gap: 5px;
    align-items: center;
    flex-shrink: 0;
  }

  .typing-dots span {
    width: 7px; height: 7px;
    background: var(--text-tertiary);
    border-radius: var(--r-full);
    animation: typing-bounce 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .typing-label {
    font-size: var(--text-xs);
    color: var(--text-tertiary);
    font-family: var(--font-mono);
    margin-left: var(--sp-2);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }

  /* ==========================================================================
     EMPTY STATE — Centered welcome
     ========================================================================== */

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    gap: var(--sp-2);
    text-align: center;
    padding: var(--sp-10) var(--sp-6);
  }

  .empty-icon {
    width: 56px; height: 56px;
    border-radius: var(--r-lg);
    background: var(--accent-surface);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: var(--sp-2);
  }

  .empty-icon svg {
    width: 28px; height: 28px;
    color: var(--accent);
  }

  .empty-state h2 {
    font-size: var(--text-lg);
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .empty-state p {
    font-size: var(--text-sm);
    max-width: 360px;
    line-height: 1.6;
    color: var(--text-secondary);
  }

  .empty-chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: var(--sp-2);
    margin-top: var(--sp-3);
  }

  .empty-chip {
    font-family: var(--font-sans);
    font-size: var(--text-sm);
    padding: var(--sp-2) var(--sp-3);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--r-full);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all var(--dur-fast) var(--ease-out);
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
  }
  .empty-chip:hover {
    background: var(--accent-surface);
    border-color: var(--accent);
    color: var(--accent);
  }
  .empty-chip:active { transform: scale(0.97); }

  /* ==========================================================================
     PREVIEW STRIP — Attached files before send
     ========================================================================== */

  .preview-strip {
    display: none;
    flex-wrap: wrap;
    gap: var(--sp-2);
    padding: var(--sp-3) var(--sp-5) 0;
    padding-left: calc(var(--sp-5) + var(--safe-left));
    padding-right: calc(var(--sp-5) + var(--safe-right));
    background: var(--surface-solid);
    flex-shrink: 0;
  }
  .preview-strip.has-items { display: flex; }

  .preview-item {
    position: relative;
    display: flex;
    align-items: center;
    gap: var(--sp-2);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 6px 10px;
    max-width: 200px;
    animation: msg-in var(--dur-normal) var(--ease-out) both;
  }

  .preview-item img {
    width: 44px; height: 44px;
    object-fit: cover;
    border-radius: var(--r-sm);
    flex-shrink: 0;
  }

  .preview-item-info {
    min-width: 0;
    overflow: hidden;
  }

  .preview-item-name {
    font-size: var(--text-xs);
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 110px;
  }

  .preview-item-size {
    font-size: var(--text-xs);
    color: var(--text-tertiary);
  }

  .preview-item .play-btn {
    width: 36px; height: 36px;
    border-radius: var(--r-full);
    background: var(--accent-dim);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    transition: transform var(--dur-fast) var(--ease-spring);
  }
  .preview-item .play-btn:active { transform: scale(0.92); }

  .preview-remove {
    position: absolute;
    top: -6px; right: -6px;
    width: 20px; height: 20px;
    border-radius: var(--r-full);
    background: var(--red);
    border: 2px solid var(--surface-solid);
    color: #fff;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    padding: 0;
    transition: transform var(--dur-fast) var(--ease-spring);
  }
  .preview-remove:active { transform: scale(0.85); }

  .processing-indicator {
    font-size: var(--text-xs);
    color: var(--yellow);
    font-family: var(--font-mono);
    padding: var(--sp-1) 0;
    animation: dot-pulse 1.2s ease-in-out infinite;
  }

  /* ==========================================================================
     INPUT BAR — Frosted glass composer
     ========================================================================== */

  .input-bar {
    display: flex;
    align-items: flex-end;
    gap: var(--sp-2);
    padding: var(--sp-3) var(--sp-5);
    padding-bottom: calc(var(--sp-3) + var(--safe-bottom));
    padding-left: calc(var(--sp-5) + var(--safe-left));
    padding-right: calc(var(--sp-5) + var(--safe-right));
    background: var(--surface);
    -webkit-backdrop-filter: saturate(180%) blur(var(--blur));
    backdrop-filter: saturate(180%) blur(var(--blur));
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 100;
  }

  /* ── Tier selector ─────────────────────────────────────────────────────── */

  .tier-select {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    background: var(--surface2);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 0 var(--sp-2);
    outline: none;
    cursor: pointer;
    flex-shrink: 0;
    min-height: 44px;
    min-width: 64px;
    max-width: 80px;
    text-overflow: ellipsis;
    transition: border-color var(--dur-fast) var(--ease-out);
    -webkit-appearance: none;
    appearance: none;

    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;

  #send:hover { background: var(--accent-hover); }

  /* ==========================================================================

  .image-viewer {

  /* ==========================================================================

  @media (max-width: 374px) {

<script>
// ==========================================================================
// Firebase Authentication
// ==========================================================================

const firebaseConfig = {
  apiKey: "AIzaSyA8EVzTjkVvAU2Nbb-lsodyoMNtHA4hEzw",
  authDomain: "gemma4good.firebaseapp.com",
  projectId: "gemma4good",
  storageBucket: "gemma4good.firebasestorage.app",
  messagingSenderId: "766473338165",
  appId: "1:766473338165:web:e202a4a78b38a524e1a07c",
  measurementId: "G-MBRS3TCQTL",
};

if (typeof firebase !== 'undefined') {
  firebase.initializeApp(firebaseConfig);
  if (typeof firebase.analytics !== 'undefined') {
    firebase.analytics();
  }
}

let currentUser = null;
let idToken = null;

function signIn() {
  if (typeof firebase === 'undefined') { showError('Firebase not loaded'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider).catch(e => {
    console.error('Sign-in error:', e);
    showError('Sign-in failed: ' + e.message);
  });
}

function signOut() {
  if (typeof firebase !== 'undefined') firebase.auth().signOut();
  currentUser = null;
  idToken = null;
  updateAuthUI();
}

function updateAuthUI() {
  const signInBtn = document.getElementById('signInBtn');
  const userInfo = document.getElementById('userInfo');
  const userName = document.getElementById('userName');
  const userAvatar = document.getElementById('userAvatar');

  if (currentUser) {
    signInBtn.style.display = 'none';
    userInfo.style.display = 'flex';
    userInfo.style.gap = '8px';
    userInfo.style.alignItems = 'center';
    userName.textContent = currentUser.displayName || currentUser.email;
    if (currentUser.photoURL) {
      userAvatar.src = currentUser.photoURL;
      userAvatar.style.display = 'block';
    } else {
      userAvatar.style.display = 'none';
    }
    loadUsageStats();
  } else {
    signInBtn.style.display = 'block';
    userInfo.style.display = 'none';
    document.getElementById('usageBar').classList.remove('visible');
  }
}

async function loadUsageStats() {
  if (!idToken) return;
  try {
    const resp = await fetch('/api/user', {
      headers: { 'Authorization': 'Bearer ' + idToken }
    });
    if (resp.ok) {
      const data = await resp.json();
      if (data.limits) {
        const bar = document.getElementById('usageBar');
        bar.textContent = `${data.limits.remaining_text_today} text \u00B7 ${data.limits.remaining_media_today} media remaining today`;
        bar.classList.add('visible');
      }
    }
  } catch (e) { console.warn('Usage stats fetch failed:', e); }
}

if (typeof firebase !== 'undefined') {
  firebase.auth().onAuthStateChanged(async (user) => {
    currentUser = user;
    if (user) {
      idToken = await user.getIdToken();
      setInterval(async () => {
        try { idToken = await user.getIdToken(true); } catch(e) {}
      }, 50 * 60 * 1000);
    } else {
      idToken = null;
    }
    updateAuthUI();
  });
}

// ==========================================================================
// Pretext — efficient text measurement (loaded as ES module)
// ==========================================================================

let pretextReady = false;
let pretextPrepare = null;
let pretextLayout = null;

// Load pretext for efficient text height pre-computation
(async function initPretext() {
  try {
    const pretext = await import('https://esm.sh/pretext@latest');
    if (pretext && pretext.prepare && pretext.layout) {
      pretextPrepare = pretext.prepare;
      pretextLayout = pretext.layout;
      pretextReady = true;
      console.log('[pretext] loaded — text measurement available');
    }
  } catch (e) {
    // Pretext is a progressive enhancement; app works without it
    console.warn('[pretext] could not load, falling back to DOM measurement:', e.message);
  }
})();

/**
 * Measure text height without triggering DOM reflow.
 * Falls back to DOM measurement if pretext is unavailable.
 */
function measureTextHeight(text, widthPx, fontSizePx, lineHeight) {
  if (!pretextReady || !pretextPrepare || !pretextLayout) return null;
  try {
    const prepared = pretextPrepare(text, {
      fontSize: fontSizePx,
      lineHeight: lineHeight || 1.55,
      fontFamily: getComputedStyle(document.body).fontFamily,
    });
    const result = pretextLayout(prepared, widthPx);
    return result.height;
  } catch (e) {
    return null;
  }
}

// App logic (IIFE)
// ==========================================================================

(function() {
  'use strict';

  // ── Configuration ──────────────────────────────────────────────────────

  var MAX_IMAGE_MB = 20;
  var MAX_AUDIO_MB = 50;
  var MAX_VIDEO_MB = 100;
  var ALLOWED_IMAGE = ['image/jpeg','image/png','image/webp','image/gif','image/bmp','image/heic','image/heif'];
  var ALLOWED_AUDIO = ['audio/wav','audio/x-wav','audio/wave','audio/mpeg','audio/mp3','audio/mp4',
    'audio/m4a','audio/x-m4a','audio/aac','audio/ogg','audio/opus','audio/webm',
    'audio/flac','audio/x-flac','audio/caf','audio/x-caf','audio/3gpp','audio/amr'];
  var ALLOWED_VIDEO = ['video/mp4','video/quicktime','video/webm','video/x-matroska',
    'video/avi','video/x-msvideo','video/3gpp','video/3gpp2','video/mov'];

  // ── DOM refs ───────────────────────────────────────────────────────────

  var chatEl = document.getElementById('chat');
  var inputEl = document.getElementById('input');
  var sendBtn = document.getElementById('send');
  var tierEl = document.getElementById('tier');

  var errorBanner = document.getElementById('error-banner');

  var fileInput = document.getElementById('file-input');
  var cameraInput = document.getElementById('camera-input');
  var btnAttach = document.getElementById('btn-attach');
  var btnCamera = document.getElementById('btn-camera');
  var btnMic = document.getElementById('btn-mic');
  var recIndicator = document.getElementById('rec-indicator');

  // ── Empty-state chip shortcuts ─────────────────────────────────────────

  document.querySelectorAll('.empty-chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      inputEl.value = chip.getAttribute('data-prompt') || '';
      inputEl.dispatchEvent(new Event('input'));
      inputEl.focus();
    });
  });

  // ── Utility ────────────────────────────────────────────────────────────

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function getMediaType(file) {
    var t = (file.type || '').toLowerCase();
    var ext = (file.name || '').split('.').pop().toLowerCase();
    if (t.startsWith('image/') || ['jpg','jpeg','png','webp','gif','bmp','heic','heif'].indexOf(ext) >= 0) return 'image';
    if (t.startsWith('audio/') || ['wav','mp3','m4a','aac','ogg','opus','flac','caf','wma','amr','3gp'].indexOf(ext) >= 0) return 'audio';
    if (t.startsWith('video/') || ['mp4','mov','webm','mkv','avi','3gp','3gpp'].indexOf(ext) >= 0) return 'video';
    return 'unknown';
  }

  function getMaxMB(type) {
    if (type === 'image') return MAX_IMAGE_MB;
    if (type === 'audio') return MAX_AUDIO_MB;
    if (type === 'video') return MAX_VIDEO_MB;
    return 20;
  }

  function validateFile(file) {
    var type = getMediaType(file);
    if (type === 'unknown') return 'Unsupported file type: ' + (file.type || file.name.split('.').pop());
    var maxMB = getMaxMB(type);
    if (file.size > maxMB * 1024 * 1024) return file.name + ' is too large (' + formatSize(file.size) + '). Max: ' + maxMB + ' MB.';
    return null;
  }

  // ── Auto-resize textarea ───────────────────────────────────────────────

  inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 150) + 'px';
  });

  // ── Send on Enter (Shift+Enter for newline) ───────────────────────────

  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ── Paste images ───────────────────────────────────────────────────────

  document.addEventListener('paste', function(e) {
    var items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (var i = 0; i < items.length; i++) {
      if (items[i].type.startsWith('image/')) {
        e.preventDefault();
        var file = items[i].getAsFile();
        if (file) addAttachment(file);
      }
    }
  });

  // ── File input buttons ─────────────────────────────────────────────────

  btnAttach.addEventListener('click', function() { fileInput.click(); });
  btnCamera.addEventListener('click', function() { cameraInput.click(); });

  fileInput.addEventListener('change', function() {
    for (var i = 0; i < this.files.length; i++) addAttachment(this.files[i]);
    this.value = '';
  });

  cameraInput.addEventListener('change', function() {
    for (var i = 0; i < this.files.length; i++) addAttachment(this.files[i]);
    this.value = '';
  });

  // ── Drag and drop ─────────────────────────────────────────────────────

  chatEl.addEventListener('dragenter', function(e) {
    e.preventDefault();
    dragCounter++;
    dropOverlay.classList.add('active');
  });

  chatEl.addEventListener('dragleave', function(e) {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active'); }
  });

  chatEl.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  });

  chatEl.addEventListener('drop', function(e) {
    e.preventDefault();
    dragCounter = 0;
    dropOverlay.classList.remove('active');
    var files = e.dataTransfer.files;
    for (var i = 0; i < files.length; i++) {
      if (getMediaType(files[i]) !== 'unknown') addAttachment(files[i]);
    }
  });

  // ── Audio recording ────────────────────────────────────────────────────

  btnMic.addEventListener('click', toggleRecording);

  function toggleRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
    else startRecording();
  }

  function startRecording() {
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
      audioChunks = [];
      var mimeOptions = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/wav', ''];
      var selectedMime = '';
      for (var i = 0; i < mimeOptions.length; i++) {
        if (!mimeOptions[i] || MediaRecorder.isTypeSupported(mimeOptions[i])) {
          selectedMime = mimeOptions[i];
          break;
        }
      }

      mediaRecorder = selectedMime
        ? new MediaRecorder(stream, { mimeType: selectedMime })
        : new MediaRecorder(stream);

      mediaRecorder.addEventListener('dataavailable', function(e) {
        if (e.data.size > 0) audioChunks.push(e.data);
      });

      mediaRecorder.addEventListener('stop', function() {
        stream.getTracks().forEach(function(t) { t.stop(); });
        var mimeType = mediaRecorder.mimeType || 'audio/webm';
        var blob = new Blob(audioChunks, { type: mimeType });
        var ext = 'webm';
        if (mimeType.indexOf('wav') >= 0) ext = 'wav';
        else if (mimeType.indexOf('mp4') >= 0) ext = 'm4a';
        else if (mimeType.indexOf('ogg') >= 0) ext = 'ogg';
        addAttachment(new File([blob], 'recording.' + ext, { type: mimeType }));
      });

      mediaRecorder.start(100);
      recStartTime = Date.now();
      btnMic.classList.add('recording');
      recIndicator.classList.add('active');
      updateRecTime();
      recTimer = setInterval(updateRecTime, 500);
    }).catch(function(err) {
      showError('Microphone access denied: ' + err.message);
    });
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    btnMic.classList.remove('recording');
    recIndicator.classList.remove('active');
    clearInterval(recTimer);
    recTimer = null;
  }

  function updateRecTime() {
    var elapsed = Math.floor((Date.now() - recStartTime) / 1000);
    var m = Math.floor(elapsed / 60);
    var s = elapsed % 60;
    recTimeEl.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  }

  // ── Attachments management ─────────────────────────────────────────────

  function addAttachment(file) {
    var err = validateFile(file);
    if (err) { showError(err); return; }

    var type = getMediaType(file);
    var entry = { file: file, type: type, previewUrl: null };

    if (type === 'image') entry.previewUrl = URL.createObjectURL(file);
    else if (type === 'video') generateVideoThumb(entry);

    attachments.push(entry);
    renderPreviews();
  }

  function removeAttachment(index) {
    var a = attachments[index];
    if (a && a.previewUrl) URL.revokeObjectURL(a.previewUrl);
    attachments.splice(index, 1);
    renderPreviews();
  }

  function generateVideoThumb(entry) {
    try {
      var video = document.createElement('video');
      video.muted = true;
      video.preload = 'metadata';
      var url = URL.createObjectURL(entry.file);
      video.src = url;
      video.addEventListener('loadeddata', function() { video.currentTime = 0.5; });
      video.addEventListener('seeked', function() {
        try {
          var canvas = document.createElement('canvas');
          canvas.width = Math.min(video.videoWidth, 200);
          canvas.height = Math.round(canvas.width * video.videoHeight / video.videoWidth);
          canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
          entry.previewUrl = canvas.toDataURL('image/jpeg', 0.6);
          renderPreviews();
        } catch(e) {}
        URL.revokeObjectURL(url);
      });
      video.addEventListener('error', function() { URL.revokeObjectURL(url); });
    } catch(e) {}
  }

  function renderPreviews() {
    previewStrip.innerHTML = '';
    if (attachments.length === 0) { previewStrip.classList.remove('has-items'); return; }
    previewStrip.classList.add('has-items');

    attachments.forEach(function(att, idx) {
      var item = document.createElement('div');
      item.className = 'preview-item';

      if (att.previewUrl) {
        var img = document.createElement('img');
        img.src = att.previewUrl;
        img.alt = att.file.name;
        item.appendChild(img);
      } else if (att.type === 'audio') {
        var playBtn = document.createElement('button');
        playBtn.className = 'play-btn';
        playBtn.textContent = '\u25B6';
        playBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          new Audio(URL.createObjectURL(att.file)).play();
        });
        item.appendChild(playBtn);
      } else if (att.type === 'video') {
        var vidIcon = document.createElement('div');
        vidIcon.style.cssText = 'width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--surface3);border-radius:var(--r-sm);flex-shrink:0;';
        vidIcon.textContent = '\uD83C\uDFAC';
        item.appendChild(vidIcon);
      }

      var info = document.createElement('div');
      info.className = 'preview-item-info';

      var nameEl = document.createElement('div');
      nameEl.className = 'preview-item-name';
      var icon = att.type === 'image' ? '' : att.type === 'audio' ? '\uD83C\uDFB5 ' : '\uD83C\uDFAC ';
      nameEl.textContent = icon + att.file.name;
      info.appendChild(nameEl);

      var sizeEl = document.createElement('div');
      sizeEl.className = 'preview-item-size';
      sizeEl.textContent = formatSize(att.file.size);
      info.appendChild(sizeEl);

      item.appendChild(info);

      var removeBtn = document.createElement('button');
      removeBtn.className = 'preview-remove';
      removeBtn.textContent = '\u00D7';
      removeBtn.addEventListener('click', function() { removeAttachment(idx); });
      item.appendChild(removeBtn);

      previewStrip.appendChild(item);
    });
  }

  // ── Image viewer ───────────────────────────────────────────────────────

  imageViewer.addEventListener('click', function() { imageViewer.classList.remove('active'); });

  function showImageViewer(src) {
    viewerImg.src = src;
    imageViewer.classList.add('active');
  }

  // ── Health check ───────────────────────────────────────────────────────

  checkHealth();

  function checkHealth() {
    fetch('/health', {
      headers: idToken ? { 'Authorization': 'Bearer ' + idToken } : {}
    }).then(function(resp) {
      if (!resp.ok) throw new Error('health check failed');
      return resp.json();
    }).then(function(data) {
      var tiers = data.tiers || {};
      var miniOnline = tiers.fast === 'ok' || tiers.primary === 'ok';
      var mbpOnline = tiers.heavy === 'ok';

      setDot(dotMini, miniOnline);
      setDot(dotMbp, mbpOnline);

      var heavyOption = tierEl.querySelector('option[value="heavy"]');
      if (heavyOption) {
        heavyOption.disabled = !mbpOnline;
        heavyOption.textContent = mbpOnline ? 'heavy' : 'heavy \u2013 off';
      }

      hideError();
    }).catch(function() {
      setDot(dotMini, false);
      setDot(dotMbp, false);
    });
  }

  function setDot(el, online) {
    el.classList.remove('checking', 'online');
    if (online) el.classList.add('online');
  }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.add('visible');
    clearTimeout(showError._timer);
    showError._timer = setTimeout(hideError, 8000);
  }

  function hideError() { errorBanner.classList.remove('visible'); }

  // ── Message rendering ──────────────────────────────────────────────────

  function addMessage(role, text, routingInfo, messageAttachments, mediaInfo) {
    if (emptyState && emptyState.parentNode) emptyState.remove();
    var div = document.createElement('div');
    div.className = 'msg ' + role;

    // Render attachments
    if (messageAttachments && messageAttachments.length > 0) {
      var attContainer = document.createElement('div');
      attContainer.className = 'msg-attachments';

      messageAttachments.forEach(function(att) {
        if (att.type === 'image' && att.previewUrl) {
          var img = document.createElement('img');
          img.src = att.previewUrl;
          img.alt = att.file.name;
          img.addEventListener('click', function() { showImageViewer(att.previewUrl); });
          attContainer.appendChild(img);
        } else if (att.type === 'audio') {
          var audio = document.createElement('audio');
          audio.controls = true;
          audio.src = URL.createObjectURL(att.file);
          attContainer.appendChild(audio);
        } else if (att.type === 'video') {
          var label = document.createElement('div');
          label.className = 'msg-media-label';
          label.textContent = '\uD83C\uDFAC ' + att.file.name + ' (' + formatSize(att.file.size) + ')';
          attContainer.appendChild(label);
          if (att.previewUrl) {
            var thumb = document.createElement('img');
            thumb.src = att.previewUrl;
            thumb.alt = 'Video thumbnail';
            thumb.style.maxHeight = '120px';
            thumb.style.borderRadius = 'var(--r-sm)';
            attContainer.appendChild(thumb);
          }
        }
      });

      div.appendChild(attContainer);
    }

    if (role === 'assistant') {
      var textDiv = document.createElement('div');
      textDiv.className = 'msg-text';
      textDiv.innerHTML = renderMarkdown(text);
      div.appendChild(textDiv);
    } else if (text) {
      var textDiv2 = document.createElement('div');
      textDiv2.className = 'msg-text';
      textDiv2.textContent = text;
      div.appendChild(textDiv2);
    }

    if (routingInfo) {
      var info = document.createElement('div');
      info.className = 'routing-info';
      var parts = [];
      if (routingInfo.tier) parts.push(routingInfo.tier);
      if (routingInfo.model) parts.push(routingInfo.model.split('/').pop());
      if (routingInfo.latency != null) parts.push(routingInfo.latency + 'ms');
      if (routingInfo.tokens) parts.push(routingInfo.tokens + ' tok');
      info.textContent = parts.join(' \u00B7 ');
      div.appendChild(info);
    }

    if (mediaInfo) {
      var minfo = document.createElement('div');
      minfo.className = 'routing-info';
      var mparts = [];
      if (mediaInfo.category) mparts.push(mediaInfo.category);
      if (mediaInfo.original_size && mediaInfo.processed_size) {
        mparts.push(formatSize(mediaInfo.original_size) + ' \u2192 ' + formatSize(mediaInfo.processed_size));
      }
      if (mediaInfo.frame_count) mparts.push(mediaInfo.frame_count + ' frames');
      if (mediaInfo.duration_s) mparts.push(mediaInfo.duration_s.toFixed(1) + 's');
      if (mediaInfo.warnings && mediaInfo.warnings.length > 0) mparts.push(mediaInfo.warnings.join('; '));
      minfo.textContent = mparts.join(' \u00B7 ');
      div.appendChild(minfo);
    }

    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  function updateTypingText(text) {
    var el = document.getElementById('typing');
    if (!el) return;
    var label = el.querySelector('.typing-label');
    if (!label) {
      label = document.createElement('span');
      label.className = 'typing-label';
      el.appendChild(label);
    }
    label.textContent = text;
  }

  function addTyping() {
    if (emptyState && emptyState.parentNode) emptyState.remove();
    var div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    var dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    div.appendChild(dots);
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  function removeTyping() {
    var el = document.getElementById('typing');
    if (el) el.remove();
  }

  // ── Markdown rendering ─────────────────────────────────────────────────

  function renderMarkdown(text) {
    var html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
      return '<pre><code>' + code.trim() + '</code></pre>';
    });

    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

    return html;
  }

  // ── Send message ───────────────────────────────────────────────────────

  async function sendMessage() {
    var text = inputEl.value.trim();
    var currentAttachments = attachments.slice();

    if ((!text && currentAttachments.length === 0) || sending) return;

    sending = true;
    sendBtn.disabled = true;
    hideError();

    addMessage('user', text, null, currentAttachments);

    inputEl.value = '';
    inputEl.style.height = 'auto';
    attachments = [];
    renderPreviews();

    var tier = tierEl.value;
    addTyping();
    var startTime = Date.now();

    try {
      if (currentAttachments.length > 0) {
        var allResponses = [];

        for (var i = 0; i < currentAttachments.length; i++) {
          var att = currentAttachments[i];
          var uploadPrompt = text || 'Describe this in detail.';

          if (currentAttachments.length > 1) {
            uploadPrompt = (text || 'Analyze this media') + ' [File ' + (i + 1) + '/' + currentAttachments.length + ': ' + att.file.name + ']';
          }

          updateTypingText('Uploading ' + att.type + ' ' + (i + 1) + '/' + currentAttachments.length);

          var formData = new FormData();
          formData.append('file', att.file);
          formData.append('prompt', uploadPrompt);
          if (tier !== 'auto') formData.append('tier', tier);

          var resp = await fetch('/v1/media/upload', {
            method: 'POST',
            headers: idToken ? { 'Authorization': 'Bearer ' + idToken } : {},
            body: formData
          });

          if (!resp.ok) {
            var errData = await resp.json().catch(function() { return { error: 'Upload failed (' + resp.status + ')' }; });
            throw new Error(errData.error || errData.detail || 'Upload failed for ' + att.file.name);
          }

          allResponses.push(await resp.json());
        }

        removeTyping();

        for (var j = 0; j < allResponses.length; j++) {
          var data = allResponses[j];
          var latency = Date.now() - startTime;
          var responseContent = '';
          if (data.choices && data.choices[0]) {
            responseContent = (data.choices[0].message && data.choices[0].message.content) || data.choices[0].text || '';
          }
          var routing = data._routing || {};
          routing.latency = routing.latency_ms || latency;
          addMessage('assistant', responseContent || '(empty response)', routing, null, data._media || null);
        }

      } else {
        updateTypingText('Thinking\u2026');

        var body = {
          messages: [{ role: 'user', content: text }],
          stream: false
        };
        if (tier !== 'auto') body.tier = tier;

        var resp2 = await fetch('/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(idToken ? { 'Authorization': 'Bearer ' + idToken } : {})
          },
          body: JSON.stringify(body)
        });

        removeTyping();

        if (!resp2.ok) {
          var err2 = await resp2.json().catch(function() { return { error: 'Request failed (' + resp2.status + ')' }; });
          showError(err2.error || err2.detail || 'Request failed');
          addMessage('assistant', 'Error: ' + (err2.error || err2.detail || resp2.statusText));
          return;
        }

        var data2 = await resp2.json();
        var latency2 = Date.now() - startTime;
        var responseContent2 = '';
        if (data2.choices && data2.choices[0]) {
          responseContent2 = (data2.choices[0].message && data2.choices[0].message.content) || data2.choices[0].text || '';
        } else if (data2.content) {
          responseContent2 = data2.content;
        } else if (data2.response) {
          responseContent2 = data2.response;
        }

        var routing2 = data2._routing || {
          tier: tier,
          model: data2.model || null,
          latency_ms: latency2
        };
        routing2.latency = routing2.latency_ms || latency2;
        routing2.tokens = (data2.usage && data2.usage.total_tokens) || null;

        addMessage('assistant', responseContent2 || '(empty response)', routing2);
      }

    } catch (e) {
      removeTyping();
      showError(e.message || 'Network error');
      addMessage('assistant', 'Error: ' + (e.message || 'Could not reach the inference network.'));
    } finally {
      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // Refresh health every 30s
  setInterval(checkHealth, 30000);
})();
</script>
</body>
</html>
