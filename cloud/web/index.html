<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemma 4 Inference Network</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e4e6ed;
    --text-muted: #8b8fa3;
    --accent: #6c8cff;
    --accent-dim: #4a63cc;
    --user-bg: #2a3a6e;
    --assistant-bg: #1e2233;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --radius: 12px;
    --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  html, body { height: 100%; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---- Header ---- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .logo .badge {
    font-size: 10px;
    font-family: var(--font-mono);
    background: var(--accent-dim);
    color: #fff;
    padding: 2px 7px;
    border-radius: 6px;
    font-weight: 500;
  }

  .devices {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
  }

  .device {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    transition: background 0.3s;
  }

  .dot.online { background: var(--green); }
  .dot.checking { background: var(--yellow); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ---- Chat area ---- */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.55;
    font-size: 14px;
    animation: fadeIn 0.25s ease-out;
    white-space: pre-wrap;
    word-break: break-word;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg.assistant code {
    font-family: var(--font-mono);
    font-size: 13px;
    background: rgba(255,255,255,0.06);
    padding: 1px 5px;
    border-radius: 4px;
  }

  .msg.assistant pre {
    font-family: var(--font-mono);
    font-size: 13px;
    background: rgba(0,0,0,0.3);
    padding: 10px 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
  }

  .msg.assistant pre code {
    background: none;
    padding: 0;
  }

  .routing-info {
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }

  .typing {
    align-self: flex-start;
    padding: 14px 18px;
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 5px;
    animation: fadeIn 0.25s ease-out;
  }

  .typing span {
    width: 7px;
    height: 7px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ---- Empty state ---- */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 8px;
    text-align: center;
    padding: 40px;
  }

  .empty-state .icon { font-size: 36px; opacity: 0.4; margin-bottom: 4px; }
  .empty-state h2 { font-size: 18px; font-weight: 500; color: var(--text); }
  .empty-state p { font-size: 13px; max-width: 360px; line-height: 1.5; }

  /* ---- Input bar ---- */
  .input-bar {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 14px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tier-select {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 10px;
    outline: none;
    cursor: pointer;
    flex-shrink: 0;
  }

  .tier-select:focus { border-color: var(--accent); }

  #input {
    flex: 1;
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 150px;
    line-height: 1.45;
  }

  #input::placeholder { color: var(--text-muted); }
  #input:focus { border-color: var(--accent); }

  #send {
    width: 42px;
    height: 42px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  #send:hover { background: var(--accent-dim); }
  #send:disabled { opacity: 0.4; cursor: default; }

  #send svg { width: 18px; height: 18px; }

  /* ---- Error banner ---- */
  .error-banner {
    background: rgba(248,113,113,0.12);
    color: var(--red);
    font-size: 13px;
    padding: 10px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(248,113,113,0.2);
    display: none;
  }

  .error-banner.visible { display: block; }

  /* ---- Responsive ---- */
  @media (max-width: 600px) {
    header { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
    .logo h1 { font-size: 14px; }
    .devices { font-size: 11px; gap: 10px; }
    #chat { padding: 14px; }
    .msg { max-width: 90%; font-size: 13px; }
    .input-bar { padding: 10px 14px; gap: 8px; }
    .tier-select { padding: 8px 6px; font-size: 11px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>Gemma 4 Inference Network</h1>
    <span class="badge">CLOUD</span>
  </div>
  <div class="devices">
    <div class="device">
      <div class="dot checking" id="dot-mini"></div>
      <span>Mac Mini</span>
    </div>
    <div class="device">
      <div class="dot checking" id="dot-mbp"></div>
      <span>MacBook Pro</span>
    </div>
  </div>
</header>

<div class="error-banner" id="error-banner"></div>

<div id="chat">
  <div class="empty-state" id="empty-state">
    <div class="icon">&#9670;</div>
    <h2>Gemma 4 Inference Network</h2>
    <p>Send a message to start chatting. Requests are routed through the cloud proxy to your local Mac Mini gateway over Tailscale.</p>
  </div>
</div>

<div class="input-bar">
  <select class="tier-select" id="tier">
    <option value="auto">auto</option>
    <option value="fast">fast</option>
    <option value="primary">primary</option>
    <option value="heavy">heavy</option>
  </select>
  <textarea id="input" rows="1" placeholder="Send a message..."></textarea>
  <button id="send" title="Send">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<script>
(function() {
  const chatEl = document.getElementById('chat');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const tierEl = document.getElementById('tier');
  const emptyState = document.getElementById('empty-state');
  const errorBanner = document.getElementById('error-banner');
  const dotMini = document.getElementById('dot-mini');
  const dotMbp = document.getElementById('dot-mbp');

  let sending = false;

  // ---- Auto-resize textarea ----
  inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 150) + 'px';
  });

  // ---- Send on Enter (Shift+Enter for newline) ----
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ---- Fetch health on load ----
  checkHealth();

  async function checkHealth() {
    try {
      const resp = await fetch('/health');
      if (!resp.ok) throw new Error('health check failed');
      const data = await resp.json();

      // Parse device statuses from gateway health response
      const devices = data.devices || data.tiers || {};
      let miniOnline = false;
      let mbpOnline = false;

      // Try common response shapes
      if (data.status === 'ok' || data.status === 'healthy' || resp.ok) {
        miniOnline = true; // Gateway is on Mac Mini, so if health returns it's online
      }

      // Look for device-level info
      if (typeof devices === 'object') {
        for (const [key, val] of Object.entries(devices)) {
          const name = key.toLowerCase();
          const alive = val === true || val === 'online' || (val && val.status === 'online') || (val && val.healthy === true);
          if (name.includes('mini') || name.includes('primary') || name.includes('26b')) miniOnline = true;
          if (name.includes('macbook') || name.includes('mbp') || name.includes('fast') || name.includes('e2b') || name.includes('e4b')) mbpOnline = alive;
        }
      }

      setDot(dotMini, miniOnline);
      setDot(dotMbp, mbpOnline);
      hideError();
    } catch (e) {
      setDot(dotMini, false);
      setDot(dotMbp, false);
      showError('Cannot reach gateway. Devices may be offline.');
    }
  }

  function setDot(el, online) {
    el.classList.remove('checking', 'online');
    if (online) el.classList.add('online');
  }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.add('visible');
  }

  function hideError() {
    errorBanner.classList.remove('visible');
  }

  // ---- Message rendering ----
  function addMessage(role, text, routingInfo) {
    if (emptyState) emptyState.remove();
    const div = document.createElement('div');
    div.className = 'msg ' + role;

    if (role === 'assistant') {
      div.innerHTML = renderMarkdown(text);
    } else {
      div.textContent = text;
    }

    if (routingInfo) {
      const info = document.createElement('div');
      info.className = 'routing-info';
      const parts = [];
      if (routingInfo.tier) parts.push('tier: ' + routingInfo.tier);
      if (routingInfo.model) parts.push('model: ' + routingInfo.model);
      if (routingInfo.latency != null) parts.push('latency: ' + routingInfo.latency + 'ms');
      if (routingInfo.tokens) parts.push('tokens: ' + routingInfo.tokens);
      info.textContent = parts.join(' | ');
      div.appendChild(info);
    }

    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  function addTyping() {
    if (emptyState) emptyState.remove();
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  // ---- Simple markdown-ish rendering ----
  function renderMarkdown(text) {
    // Escape HTML
    let html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Code blocks
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
      return '<pre><code>' + code.trim() + '</code></pre>';
    });

    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    // Italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

    return html;
  }

  // ---- Send message ----
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sending) return;

    sending = true;
    sendBtn.disabled = true;
    hideError();
    addMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    const tier = tierEl.value;
    addTyping();
    const startTime = Date.now();

    try {
      const body = {
        messages: [{ role: 'user', content: text }],
        stream: false
      };
      if (tier !== 'auto') {
        body.tier = tier;
      }

      const resp = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      removeTyping();

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: 'Request failed (' + resp.status + ')' }));
        showError(err.error || err.detail || 'Request failed');
        addMessage('assistant', 'Error: ' + (err.error || err.detail || resp.statusText));
        return;
      }

      const data = await resp.json();
      const latency = Date.now() - startTime;

      // Extract the assistant's reply
      let content = '';
      if (data.choices && data.choices[0]) {
        content = data.choices[0].message?.content || data.choices[0].text || '';
      } else if (data.content) {
        content = data.content;
      } else if (data.response) {
        content = data.response;
      }

      // Build routing info
      const routing = {
        tier: data.tier || data.model_tier || tier,
        model: data.model || (data.choices && data.choices[0]?.model) || null,
        latency: latency,
        tokens: data.usage?.total_tokens || null
      };

      addMessage('assistant', content || '(empty response)', routing);

    } catch (e) {
      removeTyping();
      showError('Network error: ' + e.message);
      addMessage('assistant', 'Error: Could not reach the inference network.');
    } finally {
      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // Refresh health every 30s
  setInterval(checkHealth, 30000);
})();
</script>
</body>
</html>
